services:
  # --- Backend: Node.js / Express API ------------------------------
    - type: web
        name: moneymap-backend
            plan: free
                runtime: node
                    rootDir: backend
                        buildCommand: npm install
                            startCommand: npm start
                                envVars:
                                      - key: PORT
                                              value: 3000
                                                    - key: NODE_ENV
                                                            value: production
                                                                  - key: MONGO_URI
                                                                          sync: false
                                                                                - key: JWT_SECRET_KEY
                                                                                        sync: false
                                                                                              - key: TOKEN_EXPIRES
                                                                                                      value: "24h"
                                                                                                            - key: FRONTEND_URL
                                                                                                                    value: https://moneymap-frontend.onrender.com
                                                                                                                    
                                                                                                                      # --- Frontend: Vite / React Static Site -------------------------
                                                                                                                        - type: static
                                                                                                                            name: moneymap-frontend
                                                                                                                                rootDir: frontend
                                                                                                                                    buildCommand: npm install && npm run build
                                                                                                                                        staticPublishPath: dist
                                                                                                                                        
